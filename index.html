<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <link
      href="https://fonts.googleapis.com/css?family=Open+Sans"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Oswald"
      rel="stylesheet"
      type="text/css"
    />

    <link rel="stylesheet" href="css/bootstrap.css" />
    <link rel="stylesheet" href="style.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>

    <script
      src="https://kit.fontawesome.com/6ac3910c4e.js"
      crossorigin="anonymous"
    ></script>

    <title>3D Web Page</title>
  </head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="./script.js"></script>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark text-white py-3">
      <div class="container d-flex justify-content-between align-items-center">
        <div>
          <h1 class="logo mb-0">🎸 GuitarSetup3D</h1>
          <small class="strapline">Explore your rig in 3D</small>
        </div>
        <nav>
          <a href="index.html" class="btn btn-outline-light btn-sm me-2"
            >Home</a
          >
          <a href="about.html" class="btn btn-outline-light btn-sm">About</a>
        </nav>
      </div>
    </nav>

    <!-- Main body -->
    <div class="container-fluid mt-3">
      <div class="row">
        <!-- Model selection -->
        <div class="col-12 col-md-2 mb-3">
          <div class="card bg-secondary text-white">
            <div class="card-body">
              <h6 class="card-title">Select Model</h6>
              <div class="d-grid gap-2">
                <button
                  class="btn btn-outline-light btn-sm"
                  onclick="loadModel('acoustic_guitar')"
                >
                  🎸 Guitar
                </button>
                <button
                  class="btn btn-outline-light btn-sm"
                  onclick="loadModel('amp')"
                >
                  🔊 Amp
                </button>
                <button
                  class="btn btn-outline-light btn-sm"
                  onclick="loadModel('plectrum')"
                >
                  🎵 Plectrum
                </button>
              </div>
            </div>
          </div>

          <!-- Controls -->
          <div class="card bg-dark text-white mt-3">
            <div class="card-body">
              <h6>Controls</h6>
              <button
                class="btn btn-warning btn-sm w-100 mb-2"
                onclick="toggleWireframe()"
              >
                Wireframe
              </button>
              <button
                id="btn"
                class="btn btn-info btn-sm w-100 mb-2"
                onclick="strumGuitar()"
              >
                Strum 🎵
              </button>
              <button
                class="btn btn-secondary btn-sm w-100 mb-2"
                onclick="toggleRotate()"
              >
                Rotate Model
              </button>
            </div>
          </div>

          <div id="gui-container" class="mt-3"></div>
        </div>

        <!-- Model viewport -->
        <div class="col-12 col-md-8 mb-3">
          <div
            id="canvas-container"
            class="w-100 rounded"
            style="height: 500px; background: #111"
          >
            <canvas id="threeContainer"></canvas>
          </div>
        </div>

        <!-- Information box -->
        <div id="information" class="col-12 col-md-2 mb-3">
          <div id="info-section">

          </div>
        </div>
        </div>
      </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-2 mt-3">
      <small>Guitar Setup 3D App &copy; 2026 | University of Sussex</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function resizeContainer() {
        const container = document.getElementById("canvas-container");
        container.style.height = window.innerHeight * 0.6 + "px";
      }
      window.addEventListener("resize", resizeContainer);
      resizeContainer();
    </script>
  </body>
</html>
